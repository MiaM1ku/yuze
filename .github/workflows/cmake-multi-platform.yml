# ┌───────────────────────────────────────────────────────────────────────────┐
# │  CMake multi-platform CI/CD                                                │
# │  • push / PR → master  : 构建 + 测试                                       │
# │  • push v* tag         : 构建 + 测试 + 自动发布 GitHub Release              │
# └───────────────────────────────────────────────────────────────────────────┘
name: CMake on multiple platforms

on:
  push:
    branches: ["master"]
    tags:     ["v*"]        # v1.0.0 / v1.2.3-rc.1 等
  pull_request:
    branches: ["master"]

jobs:
  # ══════════════════════════════════════════════════════════════════════════
  # Build
  # ══════════════════════════════════════════════════════════════════════════
  build:
    name: Build [${{ matrix.platform_name }}]
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:

          # ── Windows x64 (MSVC) ────────────────────────────────────────────
          - os:            windows-latest
            c_compiler:    cl
            cpp_compiler:  cl
            build_type:    Release
            platform_name: Windows-X64

          # ── Linux x86_64 — GCC ────────────────────────────────────────────
          - os:            ubuntu-latest
            c_compiler:    gcc
            cpp_compiler:  g++
            build_type:    Release
            platform_name: Linux-X64-GCC
            strip_tool:    strip

          # ── Linux x86_64 — Clang ──────────────────────────────────────────
          - os:            ubuntu-latest
            c_compiler:    clang
            cpp_compiler:  clang++
            build_type:    Release
            platform_name: Linux-X64-Clang
            strip_tool:    strip

          # ── macOS ARM64 (Apple Silicon, macos-14+) ────────────────────────
          - os:            macos-latest
            c_compiler:    clang
            cpp_compiler:  clang++
            build_type:    Release
            platform_name: macOS-ARM64
            strip_tool:    strip

          # ── macOS x86_64 (Intel, macos-13) ───────────────────────────────
          - os:            macos-13
            c_compiler:    clang
            cpp_compiler:  clang++
            build_type:    Release
            platform_name: macOS-X64
            strip_tool:    strip

          # ── Linux ARMv7 硬浮点（交叉编译）─────────────────────────────────
          - os:            ubuntu-latest
            c_compiler:    arm-linux-gnueabihf-gcc
            cpp_compiler:  arm-linux-gnueabihf-g++
            build_type:    Release
            platform_name: Linux-ARMv7
            cross_compile: true
            apt_packages:  gcc-arm-linux-gnueabihf g++-arm-linux-gnueabihf
            cmake_system_name:      Linux
            cmake_system_processor: arm
            strip_tool:    arm-linux-gnueabihf-strip

          # ── Linux AArch64 / ARM64（交叉编译）──────────────────────────────
          - os:            ubuntu-latest
            c_compiler:    aarch64-linux-gnu-gcc
            cpp_compiler:  aarch64-linux-gnu-g++
            build_type:    Release
            platform_name: Linux-AArch64
            cross_compile: true
            apt_packages:  gcc-aarch64-linux-gnu g++-aarch64-linux-gnu
            cmake_system_name:      Linux
            cmake_system_processor: aarch64
            strip_tool:    aarch64-linux-gnu-strip

          # ── Linux RISC-V 64（交叉编译）────────────────────────────────────
          - os:            ubuntu-latest
            c_compiler:    riscv64-linux-gnu-gcc
            cpp_compiler:  riscv64-linux-gnu-g++
            build_type:    Release
            platform_name: Linux-RISCV64
            cross_compile: true
            apt_packages:  gcc-riscv64-linux-gnu g++-riscv64-linux-gnu
            cmake_system_name:      Linux
            cmake_system_processor: riscv64
            strip_tool:    riscv64-linux-gnu-strip

          # ── Linux PowerPC64 LE（交叉编译，按需取消注释）────────────────────
          # - os:            ubuntu-latest
          #   c_compiler:    powerpc64le-linux-gnu-gcc
          #   cpp_compiler:  powerpc64le-linux-gnu-g++
          #   build_type:    Release
          #   platform_name: Linux-PPC64LE
          #   cross_compile: true
          #   apt_packages:  gcc-powerpc64le-linux-gnu g++-powerpc64le-linux-gnu
          #   cmake_system_name:      Linux
          #   cmake_system_processor: powerpc64le
          #   strip_tool:    powerpc64le-linux-gnu-strip

          # ── Linux MIPS64el（交叉编译，按需取消注释）───────────────────────
          # - os:            ubuntu-latest
          #   c_compiler:    mips64el-linux-gnuabi64-gcc
          #   cpp_compiler:  mips64el-linux-gnuabi64-g++
          #   build_type:    Release
          #   platform_name: Linux-MIPS64el
          #   cross_compile: true
          #   apt_packages:  gcc-mips64el-linux-gnuabi64 g++-mips64el-linux-gnuabi64
          #   cmake_system_name:      Linux
          #   cmake_system_processor: mips64el
          #   strip_tool:    mips64el-linux-gnuabi64-strip

    steps:
      - uses: actions/checkout@v4

      # ── 安装交叉编译工具链（仅 cross_compile == true 行）─────────────────
      - name: Install cross-compilation toolchain
        if: matrix.cross_compile == true
        run: |
          sudo apt-get update
          sudo apt-get install -y ${{ matrix.apt_packages }}

      # ── 将常用路径 / 文件名写入步骤输出 ─────────────────────────────────
      - name: Set reusable strings
        id: strings
        shell: bash
        run: |
          BUILD_DIR=$(echo "${{ github.workspace }}/build" | sed 's#\\#/#g')
          echo "build-output-dir=$BUILD_DIR" >> "$GITHUB_OUTPUT"

          EXT=""
          [ "${{ runner.os }}" == "Windows" ] && EXT=".exe"
          echo "binary-name=yuze-${{ matrix.platform_name }}${EXT}" >> "$GITHUB_OUTPUT"

      # ── 配置 CMake；交叉编译时额外注入目标平台信息 ───────────────────────
      - name: Configure CMake
        shell: bash
        run: |
          EXTRA_ARGS=()
          [[ -n "${{ matrix.cmake_system_name }}" ]] && \
            EXTRA_ARGS+=(-DCMAKE_SYSTEM_NAME=${{ matrix.cmake_system_name }})
          [[ -n "${{ matrix.cmake_system_processor }}" ]] && \
            EXTRA_ARGS+=(-DCMAKE_SYSTEM_PROCESSOR=${{ matrix.cmake_system_processor }})

          cmake -B "${{ steps.strings.outputs.build-output-dir }}" \
            -DCMAKE_C_COMPILER=${{ matrix.c_compiler }}     \
            -DCMAKE_CXX_COMPILER=${{ matrix.cpp_compiler }} \
            -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}     \
            "${EXTRA_ARGS[@]}"                              \
            -S "${{ github.workspace }}"

      # ── 编译 ─────────────────────────────────────────────────────────────
      - name: Build
        run: cmake --build ${{ steps.strings.outputs.build-output-dir }} --config ${{ matrix.build_type }}

      # ── 测试（交叉编译产物无法在宿主机执行，跳过）───────────────────────
      - name: Test
        if: matrix.cross_compile != true
        working-directory: ${{ steps.strings.outputs.build-output-dir }}
        run: ctest --build-config ${{ matrix.build_type }}

      # ── 重命名为 yuze-<平台>[.exe] ────────────────────────────────────────
      - name: Rename binary
        shell: bash
        run: |
          BUILD_DIR="${{ steps.strings.outputs.build-output-dir }}"
          BINARY="${{ steps.strings.outputs.binary-name }}"

          if [ "${{ runner.os }}" == "Windows" ]; then
            SRC="$BUILD_DIR/Release/yuze.exe"
          else
            SRC="$BUILD_DIR/yuze"
          fi

          echo "Rename: $SRC  →  $BUILD_DIR/$BINARY"
          mv "$SRC" "$BUILD_DIR/$BINARY"

      # ── Strip（去除调试符号；Windows 无 strip_tool 自动跳过）────────────
      - name: Strip binary
        if: matrix.strip_tool != ''
        shell: bash
        run: |
          "${{ matrix.strip_tool }}" \
            "${{ steps.strings.outputs.build-output-dir }}/${{ steps.strings.outputs.binary-name }}"
          echo "Size after strip:"
          ls -lh "${{ steps.strings.outputs.build-output-dir }}/${{ steps.strings.outputs.binary-name }}"

      # ── 上传产物 ─────────────────────────────────────────────────────────
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.strings.outputs.binary-name }}
          path: ${{ steps.strings.outputs.build-output-dir }}/${{ steps.strings.outputs.binary-name }}
          if-no-files-found: error
          retention-days: 7

  # ══════════════════════════════════════════════════════════════════════════
  # Release（仅 push v* tag 时运行）
  # ══════════════════════════════════════════════════════════════════════════
  release:
    name: Publish GitHub Release
    needs: build                               # 全部平台构建成功后才发布
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write                          # 允许创建 Release

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0                       # 拉取完整历史，用于生成 changelog

      # ── 下载所有平台产物，展平到同一目录 ─────────────────────────────────
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path:           release-assets
          merge-multiple: true                 # 所有 artifact 合并到一个目录

      - name: Show release assets
        run: ls -lh release-assets/

      # ── 为每个文件生成 SHA-256 校验和 ────────────────────────────────────
      - name: Generate SHA256SUMS
        run: |
          cd release-assets
          sha256sum * > SHA256SUMS.txt
          cat SHA256SUMS.txt

      # ── 解析 tag 名作为版本号（去掉 refs/tags/ 前缀）────────────────────
      - name: Extract version
        id: version
        run: |
          VERSION="${GITHUB_REF#refs/tags/}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          # 判断是否为预发布（含 alpha / beta / rc 字样）
          if [[ "$VERSION" =~ (alpha|beta|rc) ]]; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      # ── 从提交历史自动生成 changelog（两个相邻 tag 之间的 commit）────────
      - name: Generate changelog
        id: changelog
        run: |
          # 获取上一个 tag（不存在则从首次提交开始）
          PREV_TAG=$(git tag --sort=-creatordate | sed -n '2p' || echo "")

          if [ -z "$PREV_TAG" ]; then
            LOG=$(git log --pretty=format:"- %s (%h)" HEAD)
          else
            LOG=$(git log --pretty=format:"- %s (%h)" "${PREV_TAG}..HEAD")
          fi

          # 写入多行输出
          {
            echo "changelog<<EOF"
            echo "$LOG"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      # ── 创建 GitHub Release 并上传所有产物 ───────────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name:   ${{ steps.version.outputs.version }}
          name:       "Release ${{ steps.version.outputs.version }}"
          prerelease: ${{ steps.version.outputs.prerelease }}
          body: |
            ## 📦 yuze ${{ steps.version.outputs.version }}

            ### ✨ Changes
            ${{ steps.changelog.outputs.changelog }}

            ---

            ### 📥 Download

            | Platform        | Architecture | File                                      |
            |-----------------|-------------|-------------------------------------------|
            | Windows         | x86_64      | `yuze-Windows-X64.exe`                    |
            | Linux (GCC)     | x86_64      | `yuze-Linux-X64-GCC`                      |
            | Linux (Clang)   | x86_64      | `yuze-Linux-X64-Clang`                    |
            | Linux           | ARMv7 hf    | `yuze-Linux-ARMv7`                        |
            | Linux           | AArch64     | `yuze-Linux-AArch64`                      |
            | Linux           | RISC-V 64   | `yuze-Linux-RISCV64`                      |
            | macOS           | ARM64       | `yuze-macOS-ARM64`                        |
            | macOS           | x86_64      | `yuze-macOS-X64`                          |

            > 校验文件完整性请使用 `SHA256SUMS.txt`：
            > ```bash
            > sha256sum -c SHA256SUMS.txt
            > ```

          files: |
            release-assets/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
